# =====================================================
# CobWebX | Configuration
# =====================================================
#
# CobWebX controls BLOCK PLACE / BREAK / USE
# inside specific WorldGuard regions.
#
# The plugin works using GROUPS.
#
# Each group defines:
#   - enabled: enables or disables the group
#   - regions: where the group works
#   - blocks: allowed blocks inside those regions
#   - block_remove_delay: time in SECONDS before placed blocks are removed
#
# IMPORTANT:
# Regions must use this format:
#
#   world:region
#
# Example:
#   world:mapa
#
# This allows CobWebX to support:
#   - multiple worlds
#   - WorldGuard regions per world
#   - Multiverse-Core compatible setups
#
# =====================================================

groups:

  boxpvp:
    enabled: true
    regions:
      - world:mapa
      - world:arena
    blocks:
      - COBWEB
      - BLUE_WOOL
      - RED_WOOL
      - BEACON
    block_remove_delay: 60

settings:
  debug: false


# =====================================================
# Commands
# =====================================================
#
# Basic:
# /cobwebx help
# /cobwebx reload
# /cobwebx check
# /cobwebx debug
# /cobwebx bypass
#
# Group management:
# /cobwebx creategroup <group>
# /cobwebx deletegroup <group>
# /cobwebx renamegroup <old> <new>
# /cobwebx listgroups
# /cobwebx info <group>
# /cobwebx toggle <group>
#
# Edit groups:
# /cobwebx add region <group> <world> <region>
# /cobwebx add block <group> <block>
#
# Remove from groups:
# /cobwebx remove region <group> <world> <region>
# /cobwebx remove block <group> <block>
#
# Delay:
# /cobwebx setdelay <group> <seconds>
#
# Bypass:
# OP players have bypass enabled by default.
# /cobwebx bypass toggles it on/off manually.
#
# =====================================================